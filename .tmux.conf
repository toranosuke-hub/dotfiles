# ====================================================================
# 1. プレフィックス（Prefix）キーの変更
# ====================================================================
# デフォルトの Ctrl-b を解除し、Ctrl-a に変更
unbind C-b
set -g prefix C-a
bind C-a send-prefix


# ====================================================================
# 2. 基本設定（tmux-sensibleでカバーされないもの）
# ====================================================================
# マウス操作を有効化
set -g mouse on

# ウィンドウとペインのインデックスを1から開始（キーボードの数字キーの並びに合わせる）
set -g base-index 1
setw -g pane-base-index 1


# ====================================================================
# 3. ペイン分割と移動（Vim風）
# ====================================================================
# 直感的な画面分割（| で左右、- で上下）※現在のディレクトリを引き継ぐ
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim風のペイン移動
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインサイズの微調整（Prefix + 大文字 H/J/K/L）※-rで連続入力可能
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


# ====================================================================
# 4. コピーモードの設定（Vim風 & WSLクリップボード連携）
# ====================================================================
# コピーモードの操作をvi風にする
setw -g mode-keys vi

# 文字選択のキーバインド（v: 通常選択, Ctrl-v: 矩形選択）
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# ★WSL用クリップボード連携（y または EnterでWindowsのクリップボードへコピー）
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "clip.exe"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "clip.exe"

# マウスドラッグ終了時の「自動コピー＆モード終了」を無効化（ハイライトを維持する）
unbind -T copy-mode MouseDragEnd1Pane
unbind -T copy-mode-vi MouseDragEnd1Pane

# 明示的な Ctrl-c でクリップボードへコピー＆モード終了
bind-key -T copy-mode C-c send-keys -X copy-pipe-and-cancel "clip.exe"
bind-key -T copy-mode-vi C-c send-keys -X copy-pipe-and-cancel "clip.exe"


# ====================================================================
# 5. TPM とプラグインの設定（Nordテーマ等）
# ====================================================================
# TPM（プラグインマネージャー）
set -g @plugin 'tmux-plugins/tpm'

# 基本設定の最適化プラグイン
set -g @plugin 'tmux-plugins/tmux-sensible'

# Nordテーマ（UIやステータスバー）
set -g @plugin 'nordtheme/tmux'

# ※ TPMの初期化（必ず一番最後に記述すること）
run '~/.tmux/plugins/tpm/tpm'
